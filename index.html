<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SL R230 Parts Atlas</title><link rel="stylesheet" href="./app.css?v=6"></head><body><main><section data-view="home"><div class="hero"><span class="kicker">Parts Atlas MVP</span><h1>Mercedes-Benz SL 350 R230</h1><p>Быстрый гараж, ТО, покупки, поиск и каталог без тяжелой загрузки.</p><img src="./car-r230.jpeg" alt="Mercedes-Benz SL R230"></div><section class="panel"><b>Текущий автомобиль</b><div id="homeInfo"></div><button class="btn primary" data-open="garage">Открыть гараж</button></section></section><section class="panel hidden" data-view="search"><h2>Поиск детали</h2><input id="q" type="search" placeholder="Например: фильтр, A 112, насос"><div id="results" class="grid status">Введите запрос.</div></section><section class="panel hidden" data-view="catalog"><h2>Каталог</h2><div id="crumbs" class="crumbs"></div><div id="catalogBody" class="grid"></div></section><section class="panel hidden" data-view="maintenance"><h2>ТО автомобиля</h2><div id="maintenanceCards" class="cards"></div><div class="panel"><b id="mtitle">Масло двигателя</b><input id="mid" type="hidden" value="engineOil"><input id="mdate" type="date"><input id="mmileage" type="number" placeholder="Пробег"><textarea id="mnote" placeholder="Комментарий, бренд, допуск, артикул"></textarea><button id="saveM" class="btn primary">Сохранить ТО</button></div></section><section class="panel hidden" data-view="garage"><h2>Гараж</h2><div class="cards"><label class="card"><small>VIN</small><input id="vin" readonly><button id="copyVin" class="btn">Копировать</button></label><label class="card"><small>Пробег</small><input id="mileage" type="number" placeholder="191000"></label><div class="card"><small>Двигатель</small><b>M112.973</b></div><div class="card"><small>КПП</small><b>722.644</b></div></div><div class="panel"><b>Добавить покупку</b><input id="pnum" placeholder="Артикул"><input id="pname" placeholder="Название"><select id="pstatus"><option>Куплено</option><option>Установлено</option><option>В запасе</option></select><input id="pdate" type="date"><input id="pmileage" type="number" placeholder="Пробег"><input id="pnode" placeholder="Узел"><button id="savePurchase" class="btn primary">Сохранить запчасть</button></div><h3>Купленные запчасти <span id="purchaseCount" class="tag"></span></h3><div id="purchases" class="grid"></div></section></main><nav class="nav"><button data-open="search">⌕<br>Поиск</button><button data-open="catalog">▦<br>Каталог</button><button data-open="maintenance">✓<br>ТО</button><button data-open="garage">▣<br>Гараж</button></nav><div id="toast" class="toast"></div><script src="./app.js?v=6"></script></body></html>
