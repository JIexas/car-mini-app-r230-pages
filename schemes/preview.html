<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Схемы Nissan Teana J32</title>
  <style>
    :root{color-scheme:dark;--bg:#050706;--panel:#101414;--line:rgba(190,255,236,.16);--text:#f4fffb;--muted:#94a5a0;--accent:#e5c170}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:14px}
    main{max-width:980px;margin:0 auto}.head{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:0 0 14px}
    h1{font-size:26px;line-height:1.05;margin:0}p{margin:6px 0 0;color:var(--muted)}.tag{display:inline-flex;border:1px solid rgba(229,193,112,.36);border-radius:999px;padding:7px 10px;color:#ffe3a1;background:rgba(229,193,112,.12);font-size:12px;font-weight:800}
    .tabs{display:flex;gap:8px;overflow:auto;margin:14px 0}.tabs button{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.055);color:var(--text);padding:9px 12px;font-weight:800;white-space:nowrap}
    .tabs button.active{border-color:rgba(229,193,112,.55);background:rgba(229,193,112,.16);color:#ffe3a1}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:12px}.card{border:1px solid var(--line);border-radius:18px;background:var(--panel);overflow:hidden;box-shadow:0 18px 44px rgba(0,0,0,.24)}
    .card img{display:block;width:100%;height:210px;object-fit:contain;background:white}.body{padding:13px}.body h2{font-size:18px;line-height:1.15;margin:0 0 6px}.sub{color:#c4d0cc;font-size:13px;margin-bottom:10px}
    .part{border-top:1px solid var(--line);padding-top:9px;margin-top:9px}.part b{display:block;font-size:13px;margin-bottom:4px}.part div,.part li{color:#b6c4c0;font-size:13px;line-height:1.35}
    ul{padding-left:18px;margin:0}.src{color:#ffe3a1;font-size:12px;margin-top:10px}
  </style>
</head>
<body>
<main>
  <div class="head">
    <div>
      <h1>Схемы Nissan Teana J32</h1>
      <p>Z8NBBUJ32AS008445 · BBUJ32 · VQ25DE · CVT</p>
    </div>
    <span class="tag">русская структура</span>
  </div>
  <div id="tabs" class="tabs"></div>
  <div id="cards" class="grid"></div>
</main>
<script>
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let data;
let active = "";
function render(){
  const categories = data.categories || [];
  if(!active) active = categories[0]?.id || "";
  document.getElementById("tabs").innerHTML = categories.map(c => `<button class="${c.id===active?'active':''}" data-id="${esc(c.id)}">${esc(c.title)}</button>`).join("");
  document.querySelectorAll("[data-id]").forEach(btn => btn.onclick = () => { active = btn.dataset.id; render(); });
  const items = (data.items || []).filter(item => item.categoryId === active);
  document.getElementById("cards").innerHTML = items.map(item => `
    <article class="card">
      <img src="${esc(item.image)}" alt="">
      <div class="body">
        <h2>${esc(item.title)}</h2>
        <div class="sub">${esc(item.subtitle || "")}</div>
        <div class="part"><b>Что внутри</b><div>${esc(item.contains)}</div></div>
        <div class="part"><b>Где искать</b><div>${esc(item.location)}</div></div>
        <div class="part"><b>Когда открывать</b><div>${esc(item.whenToUse)}</div></div>
        ${item.keyCircuits?.length ? `<div class="part"><b>Ключевые цепи</b><ul>${item.keyCircuits.map(x => `<li>${esc(x)}</li>`).join("")}</ul></div>` : ""}
        <div class="src">Источник: ${esc(item.source)}</div>
      </div>
    </article>
  `).join("");
}
fetch("index.json").then(r => r.json()).then(json => { data = json; render(); });
</script>
</body>
</html>
